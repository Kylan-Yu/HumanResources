server:
  port: 8080

spring:
  application:
    name: hrms-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.15.100:8848
        namespace: hrms
        group: DEFAULT_GROUP
      config:
        server-addr: 192.168.15.100:8848
        namespace: hrms
        group: DEFAULT_GROUP
        file-extension: yml
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods: '*'
            allowedHeaders: '*'
            allowCredentials: true
      routes:
        - id: hrms-auth
          uri: lb://hrms-auth
          predicates:
            - Path=/auth/**

        - id: hrms-system-api
          uri: lb://hrms-system
          predicates:
            - Path=/users/**,/roles/**,/menus/**,/dicts/**,/org/**,/dept/**,/position/**,/rank/**,/employees/**,/employee-changes/**,/recruit-requirements/**,/payroll-standards/**,/performance/**,/training/**,/contracts/**

        - id: hrms-system-misc
          uri: lb://hrms-system
          predicates:
            - Path=/test/**,/db-test/**,/test-org/**

  redis:
    host: 192.168.15.100
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 0
        max-wait: -1ms

logging:
  level:
    org.springframework.cloud.gateway: debug
    com.hrms: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

