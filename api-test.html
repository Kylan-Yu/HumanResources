<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testDicts()">测试字典API</button>
    <button onclick="testRoles()">测试角色API</button>
    <button onclick="testMenus()">测试菜单API</button>
    <div id="result"></div>

    <script>
        async function testDicts() {
            try {
                const response = await fetch('http://localhost:8082/dicts');
                const data = await response.json();
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        }

        async function testRoles() {
            try {
                const response = await fetch('http://localhost:8082/roles/list');
                const data = await response.json();
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        }

        async function testMenus() {
            try {
                const response = await fetch('http://localhost:8082/menus/tree');
                const data = await response.json();
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
